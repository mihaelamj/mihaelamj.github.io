       <h1>Generate Xcode Project</h1>
<p>Once the Vapour app has been created, you may generate the Xcode project.</p>
<p>In terminal, type the command:</p>
<br>
<pre><code class="code-multiline highlight">vapor xcode -y
</code></pre>
<br>
<p>The <code class="code-inline"></code><code class="code-inline">-y</code><code class="code-inline"></code> only means “open the project in Xcode after creating it”.</p>
